      repo: https://github.com/yizhiyanhua-ai/fireworks-tech-graph
      path: .
      license: MIT
    requires:
      - cairosvg
    tags: [diagram, architecture, svg, design]
    agents: [cursor, claude, codex, opencode]
    default_scope: global

