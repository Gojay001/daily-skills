# daily-skills registry — install.sh reads this file.
version: 1
prefix: daily

skills:
  - id: agent-reach
    path: skills/agent-reach
    name: agent-reach
    summary: 给 Agent 互联网读写能力——搜/读 Twitter、Reddit、YouTube、GitHub、B站、小红书等，零 API 费用。
    source:
      repo: https://github.com/Panniantong/agent-reach
      path: agent_reach/skill
      license: MIT
    requires:
      - agent-reach
    tags: [research, internet, social, search]
    agents: [cursor, claude, codex, opencode]
    default_scope: global

  - id: brainstorming
    path: skills/brainstorming
    name: brainstorming
    summary: 任何创造性/功能开发前先做需求澄清与设计，未经用户批准禁止写代码。
    source:
      repo: https://github.com/obra/superpowers
      path: skills/brainstorming
      license: MIT
    tags: [planning, design, superpowers]
    agents: [cursor, claude, codex, opencode]
    default_scope: global

  - id: create-skill
    path: skills/create-skill
    name: create-skill
    summary: 编写或优化 Cursor Agent Skill（SKILL.md 结构、frontmatter、触发场景）。
    source:
      repo: cursor://skills-cursor/create-skill
      path: create-skill/SKILL.md
      license: Cursor built-in (personal redistribution)
    tags: [meta, authoring, cursor]
    agents: [cursor, claude, codex, opencode]
    default_scope: global

  - id: caveman
    path: skills/caveman
    name: caveman
    summary: 极简压缩沟通模式，减少 token 同时保持技术准确性（lite/full/ultra/文言文）。
    source:
      repo: https://github.com/JuliusBrussee/caveman
      path: skills/caveman
      license: MIT
    tags: [communication, efficiency]
    agents: [cursor, claude, codex, opencode]
    default_scope: global

  - id: frontend-design
    path: skills/frontend-design
    name: frontend-design
    summary: 构建或重塑 UI 时的视觉设计指导——审美方向、 typography、避免模板化默认风格。
    source:
      repo: https://github.com/anthropics/skills
      path: skills/frontend-design
      license: Apache-2.0
    tags: [design, frontend, ui]
    agents: [cursor, claude, codex, opencode]
    default_scope: global

  - id: headroom
    path: skills/headroom
    name: headroom
    summary: Headroom 上下文压缩——安装、Cursor 集成（wrap/proxy/MCP），减少 tool output 与日志 token 占用。
    source:
      repo: https://github.com/headroomlabs-ai/headroom
      path: _(curated — no upstream SKILL.md)_
      license: Apache-2.0
    tags: [efficiency, context, compression]
    agents: [cursor, claude, codex, opencode]
    default_scope: global

  - id: office-hours
    path: skills/office-hours
    name: office-hours
    summary: YC Office Hours 式产品诊断——六个 forcing questions，输出设计文档而非代码。
    source:
      repo: https://github.com/garrytan/gstack
      path: office-hours/
      license: MIT
    requires:
      - gstack
    tags: [planning, product, gstack]
    agents: [cursor, claude, codex, opencode]
    default_scope: global

  - id: writing-plans
    path: skills/writing-plans
    name: writing-plans
    summary: 在有 spec/需求后、写代码前，产出 bite-sized 实现计划（TDD、逐步 commit）。
    source:
      repo: https://github.com/obra/superpowers
      path: skills/writing-plans
      license: MIT
    tags: [planning, implementation, superpowers]
    agents: [cursor, claude, codex, opencode]
    default_scope: global
